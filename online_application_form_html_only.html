<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Form</title>
</head>
<body>

    <table border="1" align="center" cellpadding="10" cellspacing="5px" width="600">
        
        <tr >
            <th >
                ONLINE JOB APPLICATION FORM
            </th>
        </tr>
    </table>
    <br>
    <form action="https://httpbin.org/post" method="post" target="_blank" novalidate>

    <table border="1" align="center" cellpadding="5" width="600" cellspacing="3">
        <tr>
            <td>
                <p>
                    <label>Name</label>
                    <input type="text" name="u_name" size="20">
                    
                    <label>Address</label>
                    <input type="text" name="u_address" size="20">
                </p>
        

                <p>
                    Gender:
                    <label for="male_gender">MALE</label>
                    <input type="radio" name="gender" id="male_gender" value="male">
                
                    <label for="female_gender">Female</label>
                    <input type="radio" name="gender" id="female_gender" value="female">
                </p>
        

                <p>
                
                    <label for="jobAppliedFor">Job Applied for:</label>
                    <input type="text" name="job" id="jobAppliedFor" placeholder="Name of job ">
                </p>

                <p>Most preffered station</p>

                <p>

                    <label for="station_nairobi">Nairobi</label>
                    <input type="checkbox" name="station" value="Nairobi" id="station_nairobi">

                    <label for="station_kisumu">Kisumu</label>
                    <input type="checkbox" name="station" id="station_kisumu" value="Kisumu">

                    <label for="station_mombasa">Mombasa</label>
                    <input type="checkbox" name="station" id="station_mombasa" value="Mombasa">

                    <label for="station_nakuru">Nakuru</label>
                    <input type="checkbox" name="station" id="station_nakuru" value="Nakuru">
                </p>
            



        
            </td>
        </tr>

    </table>
    <p>
        <table align="center">
            <tr>
            <td colspan="2">
                <div align="center">
                <input type="submit" value="SUBMIT">
            
                &nbsp;&nbsp;&nbsp;&nbsp;<input type="reset" value="RESET">
                </div>
            </td>
            </tr>
        </table>
    </p>
</form>
</body>
</html>
