<!--Cascading Style Sheets
used to format the layout of a webpage
inline - by using the style attribute inside HTML elements
Inernal - by using a <style> element in the <head>section
External - by using a <link> element to link to an external to link to an eternal CSS file-->
<!DOCTYPE html>
<html>
    <head>
        <!--Intenal CSS-->
        <style>

            body {background-color: powderblue;}
            h1 {
                color: blue;
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: 300%;
            }
            p {
                color: red;
                font-family: 'Courier New', Courier, monospace;
                font-size: 100%;
                border: 2px solid sandybrown;
                padding: 30px;
                margin: 50x;
                
            }
        </style>
        <!--padding; space btn the text and border.-->
        <!--margin; space outside the border-->
    </head>
<body>
<!--Inline CSS-->
<h1 style="color:blue;">A Blue Heading</h1>

<p style="color:red;">A red paragraph.</p>

</body>
</html>
