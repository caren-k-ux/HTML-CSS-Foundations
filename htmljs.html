<!DOCTYPE html>
<html>
  <head>
    <title>HTML Javascript</title>
    <style>
      hr
      {
        border: none;
        border-top: 1px solid rgba(12, 12, 12, 0.3);
      }
      body
      {
        padding: 10px;
      }

      h1
      {
        font-weight: lighter;
      }
      h2
      {
        font-weight: lighter;
      }
    </style>
  </head>
  <body>
    <h1>HTML JavaScript</h1>
    <hr>
    <p>Javascript makes HTML pages more dynamic and interactive.</p>
    <hr>
    <h1>My First Javascript</h1>
    <button type="button" onclick="document.getElementById('demo').innerHTML = Date()"> Click me to display Date and Time.</button>
    <p id="demo"></p>
    <hr>
    <h2>The HTML <<span style="color:black;">script</span>> Tag</h2>
    <p>The HTML <span>script</span> tag is used to define a client-side script (Javascript).</p>
    <pre>
      <code>
        <iframe src="url" title="description" ></iframe>
      </code>
    </pre>
  </body>
</html>
