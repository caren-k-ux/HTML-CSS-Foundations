<!--The HTML style attribute is used to add styles to an element,such as 
coler, font, size, and more; The syle attribute follows the following syntax
<tagname style="property:value;" the property is a CSS property.
The value is a CSS value-->

<!DOCTYPE html>
<html>
    <head>
        <title>Style Attribute</title>
    </head>
    <!--background-color property defines the background color for an HTML element-->
    <body style="background-color: rgb(123, 133, 134);">
        <!--background color can be set for two diff elements-->
        <h1 style="background-color: rgb(148, 168, 168);">This is a heading.</h1>
        <p style="background-color: rgb(191, 172, 168);">This is a paragraph</p>
        <p>I am normal</p>
        <!--Text color-->
        <p style="color: red;">I am red</p>
        <p style="color: brown;">I am brown</p>
        <p style="font-size: 50px;">I am big</p>
        <!--font-family defines the font to be used for an HTML element-->
        <h2 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">This is heading 2</h2>
        <p style="font-family: 'Courier New', Courier, monospace;">This is a paragraph written in font family courier</p>
        <p style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Written in Verdana</p>
        <!--Textsize(font-size); Defines the tet size in an HTML element;-->
        <p style="font-size: 100%; font-family: Verdana, Geneva, Tahoma, sans-serif;">This is a paragraph with font size 100%</p>
        <p style="font-size: 300%; font-family: 'Courier New', Courier, monospace;">Font size 300% courier</p>

        <!--Text Alignment; defines the horizontal text alignment for an HTML element-->
        <h2 style="text-align: center;">Centered Heading</h2>
        <p style="text-align: center;">Centered paragraph</p>

    </body>
</html>
