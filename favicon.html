<!--A favicon is a small image displayed next to the page  title in the browser tab.
A favicon is a small image so it should be made on high contrast
you can use any image you like as your favicon.
you can also  create your own favicon on sites like https://www.favicon.cc-->

<!DOCTYPE html>
<html>
    <head>
        <title>HTML Favicon</title>
        <link rel="icon" type="image/x-icon" href="/images/favicon (1).ico">
        <style>
            body {
                background-image: url('/images/pexels-kgstudios-27289150.jpg');
                background-attachment: fixed;
                background-size: cover;
                background-repeat: no-repeat;

            }

            a:link {
                color: coral;
                background-color: transparent;
                text-decoration: none;
                
            }

            a:visited {
                color:hotpink;
                background-color: transparent;
                text-decoration: none;
            }

            a:hover {
                color: rgb(163, 133, 133);
                background-color: transparent;
                text-decoration: none;
            }

            a:active {
                color:wheat;
                background-color:aqua ;
                text-decoration: underline;
            }
            
            p {
                color: brown;
                
            }
        </style>
    </head>

    <body>
        <h1 style="color: crimson;">This is a heading</h1>
        <p><a href="https://www.favicon.cc" title="you can also create your own favicon on sites like this click on link to see" target="_blank">cite for creating favicons</a></p>
        <p><i>To add a favicon use the link attribute in the head tag<br>
            with the relationship as icon and type as image/x-con <br>and an href attribute for the path</i></p>

    </body>
</html>
