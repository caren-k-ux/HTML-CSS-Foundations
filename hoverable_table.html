<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- standard reusable head section -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hoverable table.">
    <meta name="author" content="Caren">
    <title>Hoverable table</title>
    <style>
        table {
            background-color:rgb(232, 152, 61);
            border-collapse: collapse;
        }
     

        th, td {
            padding: 8px;
            border-bottom:1px solid rgb(234, 72, 12);
            text-align:left;
            border: 1px solid pink;

        }
        tr:hover {
            background-color: aqua;
        }
        body {
            background-color: pink;
        }
    </style>
  </head>
  <body>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Occupation</th>
        </tr>
        <tr>
            <td>Victor</td>
            <td>24</td>
            <td>Doctor</td>

        </tr>
        <tr>
            <td>Jotham</td>
            <td>30</td>
            <td>Accountant</td>
        </tr>
        <tr>
            <td>Corrins</td>
            <td>35</td>
            <td>Engineer</td>
        </tr>
        <tr>
            <td>Sunday</td>
            <td>36</td>
            <td>Engineer</td>
        </tr>
    </table>

    <footer>
      <p>&copy; 2025 Caren. All rights reserved.</p>
    </footer>
  </body>
</html>
