<!--A HTML element is defined by a start tag, some content, and an end tag-->
<!--Empty elements have no end tag e.g <br>-->
<!--HTML Attributes provide additional information about elements
All HTML elements have attributes
Attributes are always specified in the start tag
Attributes usually come in the name/value pairs like:name = "value"-->
<!DOCTYPE html>
<!--The lang Attribute-->
<html lang="en-US">
  <head>
    <title>HTML ATTRIBUTES</title>
  </head>
  <body>
    <h3 title="I am header">Testing HTML Attributes</h3>
    <!--The href Attribute
    the <a> tag defines a hyperlink.The href attribute specifies the destination of the link-->
    <a href="https://www.edclub.com">Visit Typing club to improve your typing skills</a>
    <!--The src Attribute-->
    <p>The <img> tag is used to embed an image in an HTML age</p>
    <p>The src attribute specifies the pathe to the image to be displayed </p>
    <br><img src="img_girl.jpg" alt="Girl with a Jacket" width = "500" height="600">
    <!--This is a Relative URL;links to an image hosted within the website
    if the URL does not begin with a slash, it will be relative to the current page
    if the URL begins wit a flash, it will be relative to the domain.Example:src="/images/img_girl.jpg"
    
    Absolute url;links to an eternal image that is hosted on another website.
    e.g src=https://www.W3schools.com/images/img_girl.jpg"-->
    <br><img src="https://www.W3schools.com/images/img_girl.jpg" alt="Girl with a Jacket" width="500" height="600">
    <!--The alt attribut specifies the alternative text for an image
    Allows the users who cannot see the image to get an understanding of what the image contains-->

    <!--The style attribute
    Used to add styles to an element, such as colour, font, size, and more-->
    <p style="color:firebrick;" title="firebrick is the font colour">This is a firebrick paragraph</p>
    <!--The title attribute
    defines some extra info about an element; displayed when a mouse 
is hovered over it-->
    <p title="Reccomended for begginers who wanna learn to type">Typing Club or edclub</p>
    <!--It is recommended that HTML attributes values be quoted though it is not mandatory-->
    


  </body>
</html>
