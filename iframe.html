<!DOCTYPE html>
<html>
<body>

<h2>Custom Iframe Border</h2>
<p>With CSS, you can also change the size, style and color of the iframe's border:</p>

<iframe src="https://www.youtube.com" name= "w3schools" style="border:2px solid red;width:100px;height:100px" title="Iframe Example"></iframe>
<a href="https://www.youtube.com" iframe ="w3schools">youtube.com</a>
</body>
</html>
